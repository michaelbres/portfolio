name: Daily MLB Data Update

on:
  schedule:
    # 6:00 AM EST = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Fetch mode: daily | init | date | range'
        required: false
        default: 'daily'
      start_date:
        description: 'Start date for range mode (YYYY-MM-DD)'
        required: false
      end_date:
        description: 'End date for range mode (YYYY-MM-DD)'
        required: false

jobs:
  fetch-statcast:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: data_pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r data_pipeline/requirements.txt

      - name: Run daily fetch
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily')
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python data_pipeline/fetch_statcast.py --daily

      - name: Run init (full season load)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'init'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python data_pipeline/fetch_statcast.py --init

      - name: Run date fetch
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'date'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python data_pipeline/fetch_statcast.py --date ${{ github.event.inputs.start_date }}

      - name: Run range fetch
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'range'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: >
          python data_pipeline/fetch_statcast.py
          --range ${{ github.event.inputs.start_date }} ${{ github.event.inputs.end_date }}
