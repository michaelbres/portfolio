services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false

  - type: cron
    name: nightly-calibration
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    schedule: "0 6 * * *"    # 6:00 AM UTC = 1:00 AM ET — after all West Coast games finish
    startCommand: python data_pipeline/nightly_calibration.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString

  - type: static
    name: portfolio-frontend
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: portfolio-db
    plan: free
    ipAllowList: []
