# ── Card Sniper Configuration ─────────────────────────────────────────────────
# Monitors eBay for 2025 Topps Chrome NFL listings that may be mislabeled
# variation cards priced as base cards.

# ── Notifications (configure at least one) ───────────────────────────────────

# ntfy.sh — easiest option for phone alerts, zero account needed
# 1. Install "ntfy" from App Store or Google Play
# 2. Pick any unique topic name (treat it like a password — don't share it)
# 3. In the app: tap + → enter your topic name → Subscribe
# 4. Paste that same topic name here
ntfy_topic: "card-sniper-7492030583929299483"

# Discord webhook — rich embeds with card image + variation notes
# Create one at: Server Settings → Integrations → Webhooks
discord_webhook_url: "PASTE_YOUR_DISCORD_WEBHOOK_URL_HERE"

# eBay App ID (Client ID from developer.ebay.com)
# Free to register — only needs Finding API (no OAuth required for searches)
ebay_app_id: "PASTE_YOUR_EBAY_APP_ID_HERE"

# How often to check for new listings (seconds)
# eBay limits: ~5000 calls/day on free tier → safe floor is 60s
poll_interval_seconds: 60

# Maximum price to alert on (dollars). Listings above this are skipped.
# Per-player overrides below take precedence over this global cap.
global_max_price: 30.00   # alert on anything under $30

# Only alert on "Buy It Now" listings (excludes auctions where price rises)
buy_it_now_only: true

# Listings seen in this file won't re-alert on restart
seen_ids_file: "seen_ids.txt"

# ── Players to watch ──────────────────────────────────────────────────────────
# Each entry needs:
#   name        - Player name as it would appear in an eBay listing title
#   max_price   - Alert if listed below this price (use null to use global_max_price)
#   note        - Optional reminder about which variations to look for
#
# TWO variation types to snipe across all players:
#   1. IMAGE VARIATION — completely different photo (away white jersey, sideline pose,
#      no helmet), rainbow chrome border. Sellers list as plain base RC.
#   2. LIGHT BOARD — same in-game action photo as base, BUT black background with
#      a visible dotted/halftone grid pattern behind the player. Easy to miss.
players:
  - name: "Jaxson Dart"
    max_price: 30.00
    note: >
      BASE = black solid background, blue home jersey, in-game throwing, helmet ON.
      IMAGE VARIATION = rainbow chrome border, WHITE away jersey, sideline laughing, helmet OFF/holding helmet.
      LIGHT BOARD = same throwing action photo BUT black dotted/halftone grid background (dot matrix behind player).
      CAMO VARIATION = red/white/blue digital pixel camo border, blue jersey throwing — also a separate SP.
      Any of the three are worth buying if listed as a plain base.

  - name: "Malik Nabers"
    max_price: 20.00
    note: "RC — watch for image variation (away jersey/different pose) and light board (dot grid background). Send base card pic to update these notes."

  - name: "Luther Burden"
    max_price: 20.00
    note: >
      BASE = standard silver chrome border, dark navy Bears home jersey, helmet ON, in-game running with ball, plain background.
      IMAGE VARIATION = rainbow chrome border, WHITE away jersey, sideline pose, NO helmet, no number visible.
      LIGHT BOARD = same in-game running action (navy jersey, helmet on) BUT black dotted/halftone grid background behind player.
      Both variations are worth multiples of base — buy either if listed as plain base RC.

  - name: "Abdul Carter"
    max_price: 20.00
    note: >
      BASE = silver/gold chrome border, blue Giants home jersey #51, helmet ON, in-game running action, plain background.
      IMAGE VARIATION = rainbow chrome border, WHITE away jersey #51, holding helmet, static sideline pose, face visible.
      LIGHT BOARD = same in-game running action (blue jersey, helmet on) BUT black dotted/halftone grid background behind player.
      Position label = 'Edge' on both base and variations. Buy either variation if listed as plain base RC.

# ── Search configuration ──────────────────────────────────────────────────────
# Keywords always added to every search query
base_keywords: "2025 Topps Chrome NFL"

# Keywords that must NOT be in the listing title (case-insensitive)
# Helps filter obvious junk
exclude_keywords:
  - "lot"
  - "repack"
  - "mystery"
  - "custom"
  - "copy"
  - "reproduction"
  - "fake"
